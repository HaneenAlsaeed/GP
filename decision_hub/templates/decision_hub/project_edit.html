{% extends "decision_hub/layout.html" %}

{% block title %}Edit Project - AI Decision Hub{% endblock %}
{% block header_title %}Edit Project Workspace{% endblock %}

{% block body %}
<div class="container-fluid p-0">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white">
                <div class="card-header bg-transparent border-bottom px-4 pt-4 pb-3">
                    <h5 class="fw-bold text-dark m-0"><i class="bi bi-pencil-square text-primary me-2"></i>Edit Project: {{ project.title }}</h5>
                </div>
                <form action="{% url 'decision_hub:project_edit' project_id=project.id %}" method="post">
                    {% csrf_token %}
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Project Title</label>
                            {{ form.title }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Project Description</label>
                            {{ form.description }}
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top px-4 py-3 d-flex justify-content-end gap-2">
                        <a href="{% url 'decision_hub:project_detail' project_id=project.id %}" class="btn btn-light rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Update Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
